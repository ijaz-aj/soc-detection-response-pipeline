title: Renamed System Binary (Masquerading)
id: a5353e21-0935-45c4-985c-149148cc49c6
status: experimental
description: >
  Detects a signed Windows system binary running under a different on-disk name than its embedded
  OriginalFileName (Sysmon Event ID 1). Renaming a binary (e.g. copying powershell.exe to
  svchost.exe) defeats name-based detection and hides the tool in a process list; the PE metadata
  OriginalFileName does not change on rename, so a mismatch reveals the masquerade (T1036.003).
references:
  - https://attack.mitre.org/techniques/T1036/003/
author: ijaz-aj
date: 2026-07-06
tags:
  - attack.defense_evasion
  - attack.t1036.003
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    OriginalFileName:
      - 'Cmd.Exe'
      - 'PowerShell.EXE'
      - 'pwsh.dll'
      - 'wscript.exe'
      - 'cscript.exe'
      - 'MSHTA.EXE'
      - 'RUNDLL32.EXE'
      - 'REGSVR32.EXE'
      - 'CertUtil.exe'
  filter_legit:
    - OriginalFileName: 'Cmd.Exe'
      Image|endswith: '\cmd.exe'
    - OriginalFileName: 'PowerShell.EXE'
      Image|endswith: '\powershell.exe'
    - OriginalFileName: 'pwsh.dll'
      Image|endswith: '\pwsh.exe'
    - OriginalFileName: 'wscript.exe'
      Image|endswith: '\wscript.exe'
    - OriginalFileName: 'cscript.exe'
      Image|endswith: '\cscript.exe'
    - OriginalFileName: 'MSHTA.EXE'
      Image|endswith: '\mshta.exe'
    - OriginalFileName: 'RUNDLL32.EXE'
      Image|endswith: '\rundll32.exe'
    - OriginalFileName: 'REGSVR32.EXE'
      Image|endswith: '\regsvr32.exe'
    - OriginalFileName: 'CertUtil.exe'
      Image|endswith: '\certutil.exe'
  condition: selection and not filter_legit
falsepositives:
  - Rare software that copies/renames a system binary as part of installation - verify the path,
    signer, and parent process
level: high
